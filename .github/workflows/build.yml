name: Build APK Clean Expo Final
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Expo Prebuild (Generate Android)
        run: npx expo prebuild --platform android

      - name: Force Global Node Path for Android
        run: |
          echo "NODE_BINARY=/usr/local/bin/node" >> android/gradle.properties
          echo "node=/usr/local/bin/node" >> android/local.properties
          export NODE_BINARY=/usr/local/bin/node
          export PATH=/usr/local/bin:$PATH

      - name: Decode Keystore File
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/my-release-key.keystore

      - name: Inject Credentials to Gradle
        run: |
          echo "RELEASE_STORE_FILE=my-release-key.keystore" >> android/gradle.properties
          echo "RELEASE_STORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> android/gradle.properties
          echo "RELEASE_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> android/gradle.properties
          echo "RELEASE_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> android/gradle.properties

      - name: Build Android APK (Clean & Run)
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease -x test --no-daemon --no-configuration-cache
        env:
          NODE_BINARY: /usr/local/bin/node
          PATH: /usr/local/bin:/usr/bin:/bin
