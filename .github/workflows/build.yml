name: Build APK EAS Fixed
on:
  push:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install EAS CLI Globally
        run: npm install -g eas-cli

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Decode Keystore File
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > my-release-key.keystore

      - name: Build APK Locally via EAS
        run: |
          eas build --platform android --profile preview --local --non-interactive \
          --keystore-path ./my-release-key.keystore \
          --keystore-alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
          --keystore-password "${{ secrets.ANDROID_KEY_PASSWORD }}" \
          --key-password "${{ secrets.ANDROID_KEY_PASSWORD }}"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Find and Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: ./*.apk
