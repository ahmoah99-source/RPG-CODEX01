import org.apache.tools.ant.taskdefs.condition.Os

def safeExtGet(prop, fallback) {
    rootProject.ext.has(prop) ? rootProject.ext.get(prop) : fallback
}

def resolveReactNativeDirectory() {
    def reactNativeElectronProperties = new Properties()
    def file = new File("$projectDir/../package.json")
    if (file.exists()) {
        reactNativeElectronProperties.load(file.newDataInputStream())
        if (reactNativeElectronProperties.getProperty("name") == "react-native-electron") {
            return file.getParentFile().getParentFile()
        }
    }
    return new File("$projectDir/../../../node_modules/react-native")
}

def reactNativeRoot = safeExtGet("reactNativeRoot", resolveReactNativeDirectory())

